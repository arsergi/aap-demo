---
apiVersion: aap.ansible.com/v1alpha1
kind: AnsibleAutomationPlatform
metadata:
  name: aap
spec:
  no_log: false

  controller:
    disabled: false
    # Fix git "dubious ownership" on project sync (emptyDir /var/lib/awx/projects)
    security_context_settings:
      fsGroup: 996  # awx UID — group ownership on project volume
    # fsGroup alone is insufficient: AWX clones as root, awx user runs git later
    task_extra_env: |
      - name: GIT_CONFIG_COUNT
        value: "1"
      - name: GIT_CONFIG_KEY_0
        value: safe.directory
      - name: GIT_CONFIG_VALUE_0
        value: "*"
    ee_extra_env: |
      - name: GIT_CONFIG_COUNT
        value: "1"
      - name: GIT_CONFIG_KEY_0
        value: safe.directory
      - name: GIT_CONFIG_VALUE_0
        value: "*"

  eda:
    disabled: false

  hub:
    disabled: false
    storage_type: file
    file_storage_storage_class: nfs-local-rwx
    file_storage_access_mode: ReadWriteMany
    file_storage_size: 5Gi
    route_host: aap-hub-aap-operator.apps.127.0.0.1.nip.io
