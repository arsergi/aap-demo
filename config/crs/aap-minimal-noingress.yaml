---
# AAP CR for external clusters (k3s, containerd, etc.) where ingress is managed separately
# Use with: aap-demo --infra lab deploy-aap CR=minimal-noingress PUBLIC_URL=https://...
#
# Required substitutions:
#   __PUBLIC_BASE_URL__ - External URL where AAP will be accessed (e.g., https://aap.apps.ocp.example.com)
#
apiVersion: aap.ansible.com/v1alpha1
kind: AnsibleAutomationPlatform
metadata:
  name: aap
spec:
  no_log: false

  # Disable built-in ingress/route creation - external cluster manages ingress
  ingress_type: none

  # External URL for AAP gateway (must match the ingress/route created separately)
  # The operator automatically sets CSRF_TRUSTED_ORIGINS from this URL
  public_base_url: __PUBLIC_BASE_URL__

  # Gateway API container security context
  # Required on vanilla k8s (non-OpenShift) where SCCs don't auto-assign group 0
  # runAsGroup: 0 allows writing to /run/supervisor/ which is group-writable
  api:
    security_context:
      runAsUser: 1000
      runAsGroup: 0

  controller:
    disabled: false
    ingress_type: none
    # Fix git "dubious ownership" on project sync (emptyDir /var/lib/awx/projects)
    security_context_settings:
      fsGroup: 996  # awx UID — group ownership on project volume
    # fsGroup alone is insufficient: AWX clones as root, awx user runs git later
    task_extra_env: |
      - name: GIT_CONFIG_COUNT
        value: "1"
      - name: GIT_CONFIG_KEY_0
        value: safe.directory
      - name: GIT_CONFIG_VALUE_0
        value: "*"
    ee_extra_env: |
      - name: GIT_CONFIG_COUNT
        value: "1"
      - name: GIT_CONFIG_KEY_0
        value: safe.directory
      - name: GIT_CONFIG_VALUE_0
        value: "*"

  eda:
    disabled: false
    ingress_type: none

  hub:
    disabled: false
    ingress_type: none
    storage_type: file
    file_storage_access_mode: ReadWriteOnce
    file_storage_size: 5Gi
